name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate project structure
        run: |
          test -d Assets || (echo "Missing Assets directory" && exit 1)
          test -d ProjectSettings || (echo "Missing ProjectSettings directory" && exit 1)
          echo "Unity project structure valid"

  cloud-code-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Cloud Code tests
        run: node --test Assets/CloudCode/validate-and-post-score.test.js

  check-license:
    runs-on: ubuntu-latest
    steps:
      - name: Check Unity license
        env:
          HAS_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -z "$HAS_LICENSE" ]; then
            echo "::error::UNITY_LICENSE secret is not set — Unity tests cannot run"
            echo "Add UNITY_LICENSE to repository secrets to enable Unity test jobs"
            exit 1
          fi
          echo "Unity license secret is configured"

  unity-tests:
    runs-on: ubuntu-latest
    needs: check-license
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          testMode: EditMode
          unityVersion: 6000.0.23f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
