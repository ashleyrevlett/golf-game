name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate project structure
        run: |
          test -d Assets || (echo "Missing Assets directory" && exit 1)
          test -d ProjectSettings || (echo "Missing ProjectSettings directory" && exit 1)
          echo "Unity project structure valid"

  cloud-code-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Cloud Code tests
        run: node --test Assets/CloudCode/validate-and-post-score.test.js

  unity-tests:
    runs-on: ubuntu-latest
    if: ${{ vars.UNITY_LICENSE != '' || secrets.UNITY_LICENSE != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          testMode: EditMode
          unityVersion: 6000.0.23f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
