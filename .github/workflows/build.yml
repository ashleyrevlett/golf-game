name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (C# tabs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for tab characters in C# files
        run: |
          if grep -rP "\t" Assets/Scripts/ --include="*.cs" -l; then
            echo "Tab characters found — use spaces"
            exit 1
          fi

  cloud-code-tests:
    name: Cloud Code Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Cloud Code tests
        run: node --test Assets/CloudCode/validate-and-post-score.test.js

  build-and-deploy:
    name: Build WebGL + Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Pull LFS files
        run: git lfs pull && rm -f .lfs-assets-id

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-

      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: 6000.3.10f1
          buildName: golf-game
          buildMethod: WebGLBuildScript.Build

      - name: Fix build directory permissions
        run: sudo chown -R $(id -u):$(id -g) build/

      - name: Copy _headers into build output
        run: cp _headers build/WebGL/golf-game/_headers

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@^4 pages deploy build/WebGL/golf-game/ --project-name=golf-game
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://golf-game-99x.pages.dev" >> $GITHUB_STEP_SUMMARY
