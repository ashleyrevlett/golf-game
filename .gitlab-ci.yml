include:
  - project: roborev/claude-plugin
    file: pipeline/agent-pipeline.yml

variables:
  ISSUE_ID: ""

stages:
  - test
  - deploy

lint:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - find . -name "*.cs" -exec grep -P "	" {} + && exit 1 || true
  only:
    - main
    - merge_requests

cloud-code-test:
  stage: test
  image: node:20
  script:
    - node --test Assets/CloudCode/validate-and-post-score.test.js
  only:
    - main
    - merge_requests

deploy:
  stage: deploy
  image: node:20
  script:
    - npm install -g wrangler
    - wrangler pages deploy build/ --project-name=golf-game
  environment:
    name: production
  only:
    - main
  when: manual